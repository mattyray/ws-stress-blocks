services:
  server:
    build: ./server
    ports:
      - "34197:34197"
    volumes:
      - ./server:/app
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "42069:42069"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    restart: unless-stopped

  bots:
    build: ./server
    command: ["python", "-u", "bots.py", "4", "ws://server:34197/ws"]
    volumes:
      - ./server:/app
    depends_on:
      - server
    restart: unless-stopped
